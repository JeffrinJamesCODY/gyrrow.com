<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyrrow</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
  <video autoplay muted loop class="GyVideo">
      <source src="assets/output.mp4" type="video/mp4">
    </video>

  <div class="GyOverlay"></div>

  <div class="GyHeader">
    <nav class="GyNav">
      <a href="about.html" class="GyNavLink1">About</a>
      <a href="index.html">
        <img src="assets/smallgylogo.png" alt="Gyrrow Logo" class="GyLogo">
      </a>
      <a href="press.html" class="GyNavLink2">Press</a>
    </nav>
  </div>

  <div class="GyHero">
    <div class="GyBox"></div>
    <div class="HeroFirst">Intelligence is advancement,</div>
    <div class="HeroSecond">It is the future.</div>
  </div>


  <div class="GyScrolled">
  <div class="GyScrolledText">
    <div class="soph">Building sophisticated applications that powers</div>
    <div class="westCenter">the future of Western Civilization.</div>
  </div>
  <div class="GyFooterContainer">
    <div class="theline"></div>
    <div class="GyFooterInner">
      <div class="GyFooterLeft">
        <span class="GyFooterText">Intelligence is future.</span>
        <img src="assets/gyfullmini.png" alt="Gyrrow Logo" class="GyFooterLogo">
      </div>
      <div class="GyFooterRight">
        <img src="assets/gyonlinetag.png" alt="Online Status" class="OnlineTag">
        <span class="GyCopyrightTexts"></span>
      </div>
    </div>


</body>
</html>

</body>
</html>
